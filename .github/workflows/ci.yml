name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check all Python files
        run: >
          python -c "
          import py_compile;
          py_compile.compile('helpers.py', doraise=True);
          py_compile.compile('streamlit_app.py', doraise=True);
          py_compile.compile('test_helpers.py', doraise=True);
          print('All files compile OK')
          "

      - name: Run unit tests
        run: python -m pytest test_helpers.py -v --tb=short -x
